services:
  - type: web
    name: nextgen-robotics-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py seed_categories && python manage.py createsuperuser --noinput || true"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-frontend.vercel.app"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: ADMIN_RESET_TOKEN
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: nextgen-robotics-db
          property: connectionString

databases:
  - name: nextgen-robotics-db
    plan: free