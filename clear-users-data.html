<!DOCTYPE html>
<html>
<head>
    <title>Clear All User/Member Data</title>
</head>
<body>
    <h1>Clearing All User and Member Data...</h1>
    <script>
        // Clear all user/member related data from localStorage
        const keysToRemove = [
            'nextgen_admin_teams',
            'nextgen_mentors',
            'nextgen_members',
            'nextgen_referees',
            'nextgen_mentor_session',
            'nextgen_referee_session',
            'nextgen_match_results',
            'nextgen_competition_results'
        ];

        keysToRemove.forEach(key => {
            localStorage.removeItem(key);
            console.log('Removed:', key);
        });

        document.body.innerHTML = '<h1 style="color: green;">✅ All user and member data has been completely cleared!</h1><p>All teams, mentors, members, referees, and related data removed.</p><p>You can close this window now.</p>';
    </script>
</body>
</html>
